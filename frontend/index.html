<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketingAI - Campanhas automáticas</title>
  </head>
  <body>
    <script>
      (function() {
        try {
          if (localStorage.getItem('marketingai_theme') === 'dark') document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (_) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
