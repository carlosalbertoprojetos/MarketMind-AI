services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: marketmind
      POSTGRES_PASSWORD: marketmind
      POSTGRES_DB: marketmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://marketmind:marketmind@postgres:5432/marketmind
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      S3_ENDPOINT_URL: ""
      S3_ACCESS_KEY: ""
      S3_SECRET_KEY: ""
      S3_BUCKET: ""
      OPENAI_API_KEY: ""
      OPENAI_ORG_ID: ""
      OPENAI_PROJECT_ID: ""
      OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
      OPENAI_EMBEDDING_DIM: 1536
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://marketmind:marketmind@postgres:5432/marketmind
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me
      ALGORITHM: HS256
      OPENAI_API_KEY: ""
      OPENAI_ORG_ID: ""
      OPENAI_PROJECT_ID: ""
      OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
      OPENAI_EMBEDDING_DIM: 1536
    depends_on:
      - backend
      - redis
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "worker", "--loglevel=info"]

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
